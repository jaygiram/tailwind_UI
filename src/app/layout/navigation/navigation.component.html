<div class="premium-panel nav-shell h-full p-5 text-white lg:p-6">
  <div class="mb-6">
    <p class="eyebrow text-white/55">Portfolio</p>
    <h1 class="display-title mt-3 text-3xl">Jay Giram</h1>
    <p class="mt-3 text-sm leading-8 text-white/74">
      UI/UX-focused frontend developer building polished product experiences.
    </p>
  </div>

  <div class="info-card mb-6 p-4 text-sm text-white/80">
    <div class="flex items-center justify-between gap-3">
      <p class="font-semibold text-white">Available for design-led frontend work</p>
      <span class="status-pill">Open</span>
    </div>
    <p class="mt-3 leading-7"> use contact for a direct reach-out.</p>
  </div>

  <nav aria-label="Primary" class="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-1">
    <button
      *ngFor="let section of sections"
      type="button"
      (click)="select(section.id)"
      class="nav-item flex items-center gap-3 rounded-2xl px-3 py-3 text-left transition focus:outline-none focus:ring-2 focus:ring-cyan-300/70"
      [ngClass]="{ 'nav-item-active text-cyan-100': state.selectedSection() === section.id }">
      <span class="nav-icon-wrap">
        <i class="fa-solid" [ngClass]="section.icon"></i>
      </span>
      <span class="flex-1 text-[0.96rem]">{{ section.label }}</span>
      <span class="nav-dot"></span>
    </button>
  </nav>

  <div class="info-card mt-6 hidden p-4 lg:block">
    <p class="eyebrow text-white/45">Current Lens</p>
    <p class="mt-3 text-sm leading-7 text-white/72">
      Product clarity first. Motion, depth, and styling only stay if they improve comprehension.
    </p>
  </div>
</div>
